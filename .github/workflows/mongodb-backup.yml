name: MongoDB Backup

on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      type:
        description: "Backup type"
        required: false
        default: "MANUAL"
      initiatedBy:
        description: "User ID who triggered the backup"
        required: false

jobs:
  backup:
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGO_URI: ${{ secrets.MONGODB_URI }}
      DATABASE_URL: ${{ secrets.MONGODB_URI }}

      BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}

      GOOGLE_DRIVE_CLIENT_EMAIL: ${{ secrets.GOOGLE_DRIVE_CLIENT_EMAIL }}
      GOOGLE_DRIVE_PRIVATE_KEY: ${{ secrets.GOOGLE_DRIVE_PRIVATE_KEY }}

      SERVICE: ${{ secrets.SERVICE }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      BACKUP_NOTIFY_EMAIL: ${{ secrets.BACKUP_NOTIFY_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MongoDB Database Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -L https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.9.4.tgz -o mongo-tools.tgz
          tar -xzf mongo-tools.tgz
          sudo mv mongodb-database-tools-*/bin/* /usr/local/bin/
          mongodump --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run backup
        run: node src/backup/runBackup.mjs
        env:
          BACKUP_TYPE: ${{ github.event_name == 'schedule' && 'AUTO' || (github.event.inputs.type || 'MANUAL') }}
          BACKUP_CREATED_BY: ${{ github.event.inputs.initiatedBy || '' }}
